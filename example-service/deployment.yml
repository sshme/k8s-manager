apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: example-service
  template:
    metadata:
      labels:
        app: example-service
    spec:
      containers:
      - name: app
        image: example-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080