syntax = "proto3";

package users.v1;

option go_package = "proto/gen/v1/users;usersv1";

enum Type {
    UNKNOWN = 0;
    USER    = 1;
    SERVICE = 2;
}

enum Role {
    BASE  = 0;
    ADMIN = 1;
}

message User {
    int64  id   = 1;
    string name = 2;
    Type   type = 3;
    Role   role = 4;

    string created_at = 5;
    string updated_at = 6;
}

message CreateUserRequest {
    string name = 1;
}

message CreateUserResponse {
    User user = 1;
}

message GetUserRequest {
    string id = 1;
}

message GetUserResponse {
    User user = 1;
}

// List queries.
message ListUsersRequest {
    int32 limit       = 1;
    int32 page_number = 2;

    string query = 3;
}

message ListUsersResponse {
    repeated User users = 1;
}

service UserService {
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
    rpc GetUser(GetUserRequest) returns (GetUserResponse);

    rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
}
