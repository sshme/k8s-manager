apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: k8s-manager-monitoring
type: Opaque
stringData:
  admin-user: admin
  admin-password: admin
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: k8s-manager-monitoring
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: k8s-manager-monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: k8s-manager
        orgId: 1
        folder: K8S Manager
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
