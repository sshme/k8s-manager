apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-bootstrap
  labels:
    app.kubernetes.io/name: keycloak-bootstrap
    app.kubernetes.io/part-of: k8s-manager-market
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-bootstrap
        app.kubernetes.io/part-of: k8s-manager-market
    spec:
      restartPolicy: OnFailure
      containers:
        - name: keycloak-bootstrap
          image: quay.io/keycloak/keycloak:26.1
          env:
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
          command:
            - /bin/sh
            - -ec
            - |
              until /opt/keycloak/bin/kcadm.sh config credentials \
                --server http://keycloak:8080 \
                --realm master \
                --user admin \
                --password "$KEYCLOAK_ADMIN_PASSWORD" >/dev/null 2>&1; do
                sleep 2
              done

              /opt/keycloak/bin/kcadm.sh update realms/k8s-manager \
                -s registrationAllowed=true \
                -s resetPasswordAllowed=true \
                -s loginWithEmailAllowed=true

              /opt/keycloak/bin/kcadm.sh get roles/market_admin \
                -r k8s-manager >/dev/null 2>&1 || \
                /opt/keycloak/bin/kcadm.sh create roles \
                  -r k8s-manager \
                  -s name=market_admin \
                  -s 'description=Can moderate plugins and manage all market resources'

              /opt/keycloak/bin/kcadm.sh get roles/market_publisher \
                -r k8s-manager >/dev/null 2>&1 || \
                /opt/keycloak/bin/kcadm.sh create roles \
                  -r k8s-manager \
                  -s name=market_publisher \
                  -s 'description=Can register plugins and publish releases'

              /opt/keycloak/bin/kcadm.sh add-roles \
                -r k8s-manager \
                --uusername demo \
                --rolename market_admin >/dev/null 2>&1 || true

              /opt/keycloak/bin/kcadm.sh add-roles \
                -r k8s-manager \
                --uusername demo \
                --rolename market_publisher >/dev/null 2>&1 || true
