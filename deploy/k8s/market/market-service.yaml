apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-service
  labels:
    app.kubernetes.io/name: market-service
    app.kubernetes.io/part-of: k8s-manager-market
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: market-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: market-service
        app.kubernetes.io/part-of: k8s-manager-market
    spec:
      imagePullSecrets:
        - name: timeweb-registry
      containers:
        - name: market-service
          image: 1d83e52d-nimble-crane.registry.twcstorage.ru/market/market-service:manual-test
          imagePullPolicy: Always
          command:
            - ./market-service
          args:
            - -grpc-port
            - "8080"
            - -storage-path
            - /app/storage
          ports:
            - name: grpc
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: market-config
            - secretRef:
                name: market-secrets
          startupProbe:
            grpc:
              port: 8080
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            grpc:
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            grpc:
              port: 8080
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: market-service
  labels:
    app.kubernetes.io/name: market-service
    app.kubernetes.io/part-of: k8s-manager-market
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: market-service
  ports:
    - name: grpc
      port: 8080
      targetPort: grpc
    - name: metrics
      port: 9090
      targetPort: metrics
