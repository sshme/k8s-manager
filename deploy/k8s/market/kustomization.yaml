apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: market

resources:
  - keycloak.yaml
  - keycloak-bootstrap-job.yaml
  - keycloak-ingress.yaml
  - market-service.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: keycloak-realm
    files:
      - realm-export.json=realm-export.json
